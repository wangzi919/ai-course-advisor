<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI興學伴 · ICL 課程顧問</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    /* ── Design Tokens (matching eduxplore.nlpnchu.org) ─────────────────── */
    :root {
      --cream:        #e8d9c8;
      --cream-light:  #f0e4d6;
      --cream-dark:   #d9c8b4;
      --brown:        #5c3d1e;
      --brown-border: #3d2b0f;
      --orange:       #f07f2a;
      --orange-hover: #d96a10;
      --orange-light: #fad4ac;
      --white:        #fff9f4;
      --text:         #3d2b0f;
      --text-muted:   #8a6a4a;
      --border-w:     3px;
      --radius:       10px;
      --shadow:       4px 4px 0px #3d2b0f;
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Page vignette (subtle edge shading like reference) ─────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at center,
        transparent 60%, rgba(93,61,28,.18) 100%);
    }

    /* ── App layout ──────────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--cream-light);
      border-bottom: var(--border-w) solid var(--brown-border);
      flex-shrink: 0;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* Pixel-art goose twins placeholder */
    .header-goose {
      display: flex;
      gap: 2px;
    }
    .goose-char {
      width: 28px;
      height: 28px;
      background: var(--cream-dark);
      border: 2px solid var(--brown-border);
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: .85rem;
    }
    .header-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .03em;
    }
    .header-title span { color: var(--orange); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .header-btn {
      padding: 6px 14px;
      background: var(--orange);
      color: white;
      font-weight: 700;
      font-size: .82rem;
      border: var(--border-w) solid var(--brown-border);
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .1s, box-shadow .1s;
      font-family: inherit;
    }
    .header-btn:hover { transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--brown-border); }
    #serverStatus {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: var(--border-w) solid var(--brown-border);
      border-radius: var(--radius);
      background: var(--white);
      font-size: .78rem;
      font-weight: 600;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .status-label { color: var(--text-muted); }
    #serverStatus.offline .status-dot { background: #ef4444; }

    /* ── Main wrapper ────────────────────────────────────────────────────── */
    .main-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar toggle button ───────────────────────────────────────────── */
    .sidebar-toggle {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 28px;
      height: 56px;
      background: var(--orange);
      border: var(--border-w) solid var(--brown-border);
      border-left: none;
      border-radius: 0 var(--radius) var(--radius) 0;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: .8rem;
      font-weight: 700;
      color: white;
      box-shadow: 3px 3px 0 var(--brown-border);
      transition: background .15s;
    }
    .sidebar-toggle:hover { background: var(--orange-hover); }
    .sidebar-toggle.open { left: 200px; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: 0;
      overflow: hidden;
      background: var(--cream-light);
      border-right: var(--border-w) solid var(--brown-border);
      transition: width .25s ease;
      flex-shrink: 0;
    }
    .sidebar.open { width: 200px; }
    .sidebar-inner { width: 200px; padding: 12px; }
    .sidebar-new-chat {
      width: 100%;
      padding: 8px;
      background: var(--orange);
      color: white;
      font-weight: 700;
      font-size: .82rem;
      border: var(--border-w) solid var(--brown-border);
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: var(--shadow);
      font-family: inherit;
      margin-bottom: 12px;
      transition: transform .1s;
    }
    .sidebar-new-chat:hover { transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--brown-border); }
    .sidebar-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    /* ── Chat container ──────────────────────────────────────────────────── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow: hidden;
      position: relative;
    }

    /* ── Big bordered chat panel ─────────────────────────────────────────── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: var(--border-w) solid var(--brown-border);
      border-radius: var(--radius);
      background: var(--cream-light);
      overflow: hidden;
      position: relative;
    }

    /* ── Quick actions ───────────────────────────────────────────────────── */
    .quick-actions {
      padding: 14px 16px 10px;
      border-bottom: 2px solid var(--cream-dark);
      flex-shrink: 0;
    }
    .quick-title {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .chip {
      padding: 6px 12px;
      background: var(--orange);
      color: white;
      font-size: .78rem;
      font-weight: 600;
      border: 2px solid var(--brown-border);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--brown-border);
      transition: transform .1s, box-shadow .1s;
      font-family: inherit;
    }
    .chip:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--brown-border); }

    /* ── Messages ───────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 99px; }

    /* ── Bubbles ──────────────────────────────────────────────────────────── */
    .msg { display: flex; gap: 10px; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; } }

    .msg.user  { flex-direction: row-reverse; align-self: flex-end; max-width: 80%; }
    .msg.bot   { align-self: flex-start; max-width: 85%; }

    .bubble {
      padding: 11px 14px;
      border: 2px solid var(--brown-border);
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: .9rem;
    }
    .msg.user .bubble {
      background: var(--orange-light);
      box-shadow: 3px 3px 0 var(--brown-border);
    }
    .msg.bot .bubble {
      background: var(--white);
      box-shadow: 3px 3px 0 var(--brown-border);
    }

    /* Markdown in bot bubbles */
    .bubble h1,.bubble h2,.bubble h3 { margin:.5em 0 .25em; color: var(--brown); }
    .bubble p  { margin-bottom: .4em; }
    .bubble ul,.bubble ol { padding-left: 1.3em; margin-bottom: .4em; }
    .bubble li { margin-bottom: .15em; }
    .bubble code { background: var(--cream-dark); padding: 1px 5px; border-radius: 4px; font-size: .85em; }
    .bubble pre  { background: var(--cream); border: 2px solid var(--cream-dark); border-radius: 6px; padding: 10px; overflow-x: auto; margin: .4em 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble strong { color: var(--orange); }
    .bubble a  { color: var(--orange); text-decoration: underline; }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 5px; padding: 2px 0; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--orange);
      animation: bounce 1.1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-6px); } }

    /* ── Pixel wizard mascot ─────────────────────────────────────────────── */
    .wizard {
      position: absolute;
      right: 12px;
      bottom: 72px;
      width: 52px;
      pointer-events: none;
      user-select: none;
      /* Pixel-art wizard drawn in CSS */
    }
    .wizard-img {
      font-size: 2.2rem;
      line-height: 1;
      display: block;
      filter: drop-shadow(2px 2px 0 var(--brown-border));
      animation: wizardBob 2.5s ease-in-out infinite;
    }
    @keyframes wizardBob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    /* ── Input area ─────────────────────────────────────────────────────── */
    .input-area {
      padding: 10px 16px;
      border-top: 2px solid var(--cream-dark);
      background: var(--cream-light);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-box {
      flex: 1;
      background: var(--white);
      border: var(--border-w) solid var(--brown-border);
      border-radius: var(--radius);
      padding: 9px 12px;
      display: flex;
      align-items: flex-end;
    }
    textarea#msgInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      resize: none;
      line-height: 1.5;
      min-height: 22px;
      max-height: 120px;
      overflow-y: auto;
    }
    textarea#msgInput::placeholder { color: var(--text-muted); }

    .mic-btn, .send-btn {
      height: 42px;
      border: var(--border-w) solid var(--brown-border);
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--orange);
      color: white;
      font-weight: 700;
      font-family: inherit;
      box-shadow: var(--shadow);
      transition: transform .1s, box-shadow .1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-btn { width: 42px; }
    .send-btn { padding: 0 18px; font-size: .9rem; }
    .mic-btn:hover, .send-btn:hover:not(:disabled) {
      transform: translate(1px,1px);
      box-shadow: 3px 3px 0 var(--brown-border);
    }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Bottom disclaimer ───────────────────────────────────────────────── */
    .disclaimer {
      text-align: center;
      font-size: .72rem;
      color: var(--text-muted);
      padding: 6px;
      background: var(--cream-dark);
      border-top: 2px solid var(--brown-border);
      flex-shrink: 0;
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .chat-container { padding: 10px; }
      .msg.user,.msg.bot { max-width: 95%; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="header-goose">
        <div class="goose-char">🐦</div>
        <div class="goose-char">🐦</div>
      </div>
      <span class="header-title"><span>AI</span>興學伴</span>
    </div>
    <div class="header-right">
      <div id="serverStatus">
        <div class="status-dot"></div>
        <span class="status-label">連線中…</span>
      </div>
      <button class="header-btn">🌐 多語版</button>
      <button class="header-btn">🔐 登入 ▼</button>
    </div>
  </div>

  <!-- Body -->
  <div class="main-wrapper" style="position:relative;">

    <!-- Sidebar toggle -->
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="展開/收起歷史紀錄">▶</button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <button class="sidebar-new-chat" onclick="newChat()">➕ 新對話</button>
        <div class="sidebar-title">對話紀錄</div>
        <div id="historyList" style="font-size:.8rem;color:var(--text-muted);">（尚無紀錄）</div>
      </div>
    </div>

    <!-- Chat container -->
    <div class="chat-container">
      <div class="chat-panel">

        <!-- Quick actions -->
        <div class="quick-actions" id="quickActions">
          <div class="quick-title">💡 快速查詢</div>
          <div class="quick-chips">
            <button class="chip" onclick="useChip(this)">🗓️ 論文口試截止日是什麼時候？</button>
            <button class="chip" onclick="useChip(this)">📅 這個月有放假嗎？</button>
            <button class="chip" onclick="useChip(this)">🎓 資工系碩士畢業門檻</button>
            <button class="chip" onclick="useChip(this)">📚 我想預約圖書館自習室</button>
            <button class="chip" onclick="useChip(this)">👨‍🏫 范耀中教授教什麼課？</button>
            <button class="chip" onclick="useChip(this)">🤖 AI 相關學分學程有哪些？</button>
          </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
          <div class="msg bot">
            <div class="bubble">
              🎓 我是您的中興大學 AI興學伴！<br><br>
              來吧！告訴我您想了解中興大學的什麼？<br><br>
              我可以幫助您：<br>
              🔍 智慧搜索教務處課程資源<br>
              📖 查詢圖書館館藏與開放時間<br>
              📋 查閱學校規章制度<br>
              📅 校曆與活動資訊
            </div>
          </div>
        </div>

        <!-- Wizard mascot -->
        <div class="wizard">
          <span class="wizard-img">🧙</span>
        </div>

        <!-- Input -->
        <div class="input-area">
          <div class="input-box">
            <textarea id="msgInput" placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)" rows="1"></textarea>
          </div>
          <button class="mic-btn" title="語音輸入">🎙️</button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">傳送</button>
        </div>

      </div><!-- /.chat-panel -->
    </div><!-- /.chat-container -->

  </div><!-- /.main-wrapper -->

  <!-- Disclaimer -->
  <div class="disclaimer">
    ⚠️ AI生成內容僅供參考，所有課程、學分、開課時間，請以教務處公告及圖書館官方資料為準
  </div>

</div><!-- /.app -->

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API_BASE = "http://localhost:5001";

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById("messages");
  const inputEl     = document.getElementById("msgInput");
  const sendBtn     = document.getElementById("sendBtn");
  const statusEl    = document.getElementById("serverStatus");
  const statusLabel = statusEl.querySelector(".status-label");

  // ── Sidebar toggle ────────────────────────────────────────────────────────
  let sidebarOpen = false;
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    document.getElementById("sidebar").classList.toggle("open", sidebarOpen);
    const btn = document.getElementById("sidebarToggle");
    btn.textContent = sidebarOpen ? "◀" : "▶";
    btn.classList.toggle("open", sidebarOpen);
  }

  function newChat() {
    messagesEl.innerHTML = `
      <div class="msg bot">
        <div class="bubble">🎓 新對話開始！有什麼我可以幫助您的嗎？</div>
      </div>`;
    document.getElementById("quickActions").style.display = "";
  }

  // ── Textarea auto-grow ────────────────────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // ── Enter to send ─────────────────────────────────────────────────────────
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Quick chips ───────────────────────────────────────────────────────────
  function useChip(btn) {
    inputEl.value = btn.textContent.replace(/^[^\s]+\s/, '').trim(); // strip emoji prefix
    inputEl.dispatchEvent(new Event("input"));
    document.getElementById("quickActions").style.display = "none";
    sendMessage();
  }

  // ── Append bubble ─────────────────────────────────────────────────────────
  function appendMsg(role, html, raw = false) {
    const wrap   = document.createElement("div");
    wrap.className = `msg ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = raw ? escapeHtml(html) : marked.parse(html);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";
    wrap.id = "typingIndicator";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const query = inputEl.value.trim();
    if (!query || sendBtn.disabled) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    document.getElementById("quickActions").style.display = "none";

    appendMsg("user", query, true);

    sendBtn.disabled = true;
    inputEl.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ query }),
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        appendMsg("bot", `❌ 伺服器回傳錯誤：${err.error || res.statusText}`);
        return;
      }

      const data = await res.json();
      if (data.success) {
        appendMsg("bot", data.answer);
      } else {
        appendMsg("bot", `❌ 處理失敗：${data.error}`);
      }

    } catch {
      hideTyping();
      appendMsg("bot",
        `❌ 無法連線到 ICL 伺服器（\`${API_BASE}\`）。\n\n請確認已執行：\n\`\`\`\npython icl_server.py\n\`\`\``);
    } finally {
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }

  // ── Health check ──────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/api/health`, { signal: AbortSignal.timeout(4000) });
      const data = await res.json();
      statusEl.classList.remove("offline");
      statusLabel.textContent = `就緒 · ${data.api_count} API`;
    } catch {
      statusEl.classList.add("offline");
      statusLabel.textContent = "伺服器未啟動";
    }
  }

  checkHealth();
  setInterval(checkHealth, 30_000);
</script>
</body>
</html>
